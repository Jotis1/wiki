name: Build & Push

on:
  push:
    branches: [main]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login docker.becall.net -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build
        run: docker build -t wiki:latest .

      - name: Tag
        run: docker tag wiki:latest docker.becall.net/wiki:latest

      - name: Push
        run: docker push docker.becall.net/wiki:latest